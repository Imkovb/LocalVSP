services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Traefik Dashboard
    volumes:
      - "./data/traefik:/etc/traefik/dynamic:ro"
    networks:
      vsp-network:
        aliases:
          - treafik
    restart: unless-stopped

  gitea:
    image: gitea/gitea:1.21
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY:-localvsp-dev-secret-change-me}
      - GITEA__server__DOMAIN=${VSP_DOMAIN:-localvsp.local}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://${VSP_DOMAIN:-localvsp.local}:3000/
      - GITEA__service__DISABLE_REGISTRATION=false
      - GITEA__log__LEVEL=Warn
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"
    networks:
      - vsp-network
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - vsp-network
    restart: unless-stopped
    # Only start if the token is provided
    profiles:
      - cloudflare

  management-ui:
    build: ./management-ui
    container_name: management-ui
    environment:
      - VSP_HOST_HOME=/home/vsp   # host-side path used in docker volume mounts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Needs access to deploy other containers
      - /home/vsp:/vsp-home                        # User deploy folders (docker/ and html/)
      - /opt/localvsp:/opt/localvsp                # Full access: docker-compose.yml + .env (read/write)
    ports:
      - "8081:8080"
    networks:
      - vsp-network
    restart: unless-stopped

networks:
  vsp-network:
    name: vsp-network
    driver: bridge
